name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t estate-backend:latest .

      - name: Build frontend image
        run: docker build -t estate-frontend:latest ./frontend

      - name: Save images to tar files
        run: |
          docker save estate-backend:latest | gzip > backend.tar.gz
          docker save estate-frontend:latest | gzip > frontend.tar.gz

      - name: Copy images to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: ${{ secrets.DO_DROPLET_USER }}
          password: ${{ secrets.DO_DROPLET_PASSWORD }}
          source: "backend.tar.gz,frontend.tar.gz"
          target: "/tmp/"

      - name: Load images and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: ${{ secrets.DO_DROPLET_USER }}
          password: ${{ secrets.DO_DROPLET_PASSWORD }}
          script: |
            set -e

            # Load new images
            docker load < /tmp/backend.tar.gz
            docker load < /tmp/frontend.tar.gz
            rm /tmp/backend.tar.gz /tmp/frontend.tar.gz

            # Restart only backend and frontend (MySQL keeps running)
            cd ~/estate-manager
            docker compose up -d --no-deps --force-recreate backend frontend

            # Clean up
            docker image prune -f
