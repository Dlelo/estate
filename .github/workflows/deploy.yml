name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  BACKEND_IMAGE: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/estate-backend
  FRONTEND_IMAGE: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/estate-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_IMAGE:${{ github.sha }} -t $BACKEND_IMAGE:latest .
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Build and push frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${{ github.sha }} -t $FRONTEND_IMAGE:latest ./frontend
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: ${{ secrets.DO_DROPLET_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            cd ~/estate-manager

            # Update image references in compose
            export REGISTRY=registry.digitalocean.com
            export REPO=${{ secrets.DO_REGISTRY_NAME }}
            export TAG=${{ github.sha }}

            # Login to registry on the droplet
            doctl registry login --expiry-seconds 300

            # Pull new images and redeploy
            docker compose pull
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f
