services:
  mysql_db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: estate
      MYSQL_USER: estate
      MYSQL_PASSWORD: ${DB_PASSWORD:-estate}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - estate-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: .
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/estate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: estate
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-estate}
      JWT_SECRET: ${JWT_SECRET:-EstateManager2026!SecretKey#XyZ$PqR@LmN&WvT_AbCdEfGhIjKlMnOpQrStUvWxYz}
      SERVER_PORT: 8080
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - estate-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - estate-net

volumes:
  mysql_data:

networks:
  estate-net:
    driver: bridge
