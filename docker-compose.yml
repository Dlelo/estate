services:
  mysql_db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: estate
      MYSQL_USER: estate
      MYSQL_PASSWORD: ${DB_PASSWORD:-estate}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - estate-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: estate-backend:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/estate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: estate
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-estate}
      JWT_SECRET: ${JWT_SECRET:-EstateManager2026!SecretKey#XyZ$PqR@LmN&WvT_AbCdEfGhIjKlMnOpQrStUvWxYz}
      SERVER_PORT: 8080
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - estate-net

  frontend:
    image: estate-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - estate-net

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      - frontend

volumes:
  mysql_data:
  certbot-webroot:

networks:
  estate-net:
    driver: bridge
