services:
  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: estate
      MYSQL_USER: estate
      MYSQL_PASSWORD: estate
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_estate_data:/var/lib/mysql

volumes:
  mysql_estate_data:
