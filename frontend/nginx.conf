server {
    listen 80;
    server_name deroestate.com www.deroestate.com;

    # ACME challenge path used by certbot for renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name deroestate.com www.deroestate.com;

    ssl_certificate     /etc/letsencrypt/live/deroestate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deroestate.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    # Security headers (applied to all responses: SPA static assets and proxied API)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Hashed build output (styles-XXXX.css, chunk-XXXX.js, main-XXXX.js, ...) is safe to cache
    # forever — any content change produces a different filename. Without this, browsers fall
    # back to heuristic caching of index.html (no Cache-Control at all otherwise), so a browser
    # tab open across a deploy keeps a stale index.html pointing at hashed filenames the new
    # deploy no longer serves — that's what "CSS broken after deploying" almost always is.
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # index.html must always be revalidated so it never goes stale across a deploy — it's the
    # only thing that tells the browser which hashed asset filenames are current.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
