<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#2c3e50"/>

  <!-- Left house (smaller, behind) -->
  <polygon points="14,38 14,28 21,21 28,28 28,38" fill="#7f8c8d"/>
  <rect x="17" y="31" width="5" height="7" fill="#2c3e50"/>

  <!-- Right house (smaller, behind) -->
  <polygon points="36,38 36,28 43,21 50,28 50,38" fill="#7f8c8d"/>
  <rect x="39" y="31" width="5" height="7" fill="#2c3e50"/>

  <!-- Center house (main, front) -->
  <polygon points="32,14 18,30 46,30" fill="#e67e22"/>
  <rect x="22" y="30" width="20" height="14" fill="#ecf0f1"/>
  <!-- Door -->
  <rect x="28" y="36" width="8" height="8" rx="4" fill="#2c3e50"/>
  <!-- Windows -->
  <rect x="23" y="32" width="5" height="4" rx="1" fill="#3498db"/>
  <rect x="36" y="32" width="5" height="4" rx="1" fill="#3498db"/>
</svg>
