spring.application.name=estate

## JWT — no fallback: startup fails fast if JWT_SECRET isn't set, rather than
## silently signing tokens with a value that was ever committed to source control.
jwt.secret=${JWT_SECRET}

## MySQL Database Connection — no fallback password; must be supplied via env var.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/estate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:estate}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#server.port=8080
server.port=${SERVER_PORT:9090}
## Stack traces/exception class names are never returned to API clients in production;
## validation/business-error messages (include-message) stay on since the frontend relies
## on err.error.message for its toasts.
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always
spring.web.error.include-exception=false
server.forward-headers-strategy=native

## M-Pesa Daraja (STK Push) — production by default; override MPESA_BASE_URL for sandbox testing
mpesa.base-url=${MPESA_BASE_URL:https://api.safaricom.co.ke}
mpesa.consumer-key=${MPESA_CONSUMER_KEY:}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET:}
mpesa.shortcode=${MPESA_SHORTCODE:}
mpesa.passkey=${MPESA_PASSKEY:}
mpesa.callback-url=${MPESA_CALLBACK_URL:}

## SendGrid (email)
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:notifications@deroestate.com}

## Twilio (SMS)
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

## Outstanding-payment reminder cadence — defaults live in ReminderProperties' field
## initializers. Spring Boot's relaxed env-var binding maps REMINDER_DAYS_BEFORE_DUE /
## REMINDER_REMIND_ON_DUE_DATE / REMINDER_DAYS_AFTER_DUE (comma-separated for the day lists)
## onto reminder.* automatically, so no explicit ${...} placeholder is declared here — that
## syntax also confuses IDE property-type inspection when the default itself contains commas.
